<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VLM Bench - Escribano</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <style>
      :root {
        --pico-font-size: 14px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--pico-muted-border-color);
      }

      .header h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      .nav-links {
        margin-left: auto;
        display: flex;
        gap: 0.5rem;
      }

      .nav-links a {
        padding: 0.5rem 1rem;
        border-radius: 4px;
        text-decoration: none;
        font-size: 0.875rem;
        transition: background 0.2s;
      }

      .nav-links a:hover {
        background: var(--pico-muted-background-color);
      }

      .nav-links a.active {
        background: var(--pico-primary-background);
        color: var(--pico-primary-inverse);
      }

      .bench-container {
        display: grid;
        grid-template-columns: 40% 60%;
        gap: 1rem;
        height: calc(100vh - 120px);
        overflow: hidden;
      }

      .panel {
        background: var(--pico-card-background-color);
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 8px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--pico-muted-border-color);
      }

      .panel-header h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      .panel-header h3 {
        margin: 0;
        font-size: 1rem;
      }

      /* Model section */
      .badge {
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 500;
      }

      .badge-loaded {
        background: #22c55e;
        color: white;
      }

      .badge-unloaded {
        background: #9ca3af;
        color: white;
      }

      .badge-loading {
        background: #eab308;
        color: white;
      }

      .badge-error {
        background: #ef4444;
        color: white;
      }

      /* Results */
      .result-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--pico-muted-border-color);
      }

      .result-meta {
        font-size: 0.75rem;
        color: var(--pico-muted-color);
      }

      /* Accordion for raw output */
      details {
        margin-top: 0.5rem;
      }

      details summary {
        cursor: pointer;
        font-size: 0.8rem;
        color: var(--pico-muted-color);
      }

      details pre {
        font-size: 0.75rem;
        max-height: 200px;
        overflow: auto;
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 2rem;
      }

      .modal.active {
        display: flex;
      }

      .modal img {
        max-width: 90%;
        max-height: 70vh;
        object-fit: contain;
      }

      .modal-content {
        background: var(--pico-card-background-color);
        padding: 1.5rem;
        border-radius: 8px;
        max-width: 90%;
        max-height: 80vh;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: none;
        border: none;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
      }

      .frame-details {
        color: var(--pico-color);
      }

      .frame-details h3 {
        margin: 0 0 0.5rem 0;
        font-size: 1.1rem;
      }

      .ground-truth-section {
        margin-top: 1rem;
      }

      .ground-truth-section h4 {
        margin: 0 0 0.5rem 0;
        font-size: 0.9rem;
        color: var(--pico-muted-color);
      }

      .gt-item {
        padding: 0.5rem;
        background: var(--pico-muted-background-color);
        border-radius: 4px;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
      }

      .gt-item label {
        font-weight: 500;
        font-size: 0.75rem;
        color: var(--pico-muted-color);
        display: block;
        margin-bottom: 0.25rem;
      }

      /* Form styles */
      .form-group {
        margin-bottom: 0.75rem;
      }

      .prompt-form-group {
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      .form-group label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 0.25rem;
        color: var(--pico-muted-color);
      }

      textarea {
        flex: 1;
        min-height: 200px;
        resize: vertical;
        font-family: monospace;
        font-size: 0.9rem;
      }

      .btn-small {
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
      }

      .run-controls {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--pico-muted-border-color);
      }

      .input-row {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
      }

      .input-row input,
      .input-row select {
        flex: 1;
      }

      /* Loading spinner */
      .spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 2px solid var(--pico-muted-border-color);
        border-top-color: var(--pico-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .spinner.active {
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .section {
        margin-bottom: 1.5rem;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }

      .section-header h3 {
        margin: 0;
        font-size: 0.95rem;
      }

      .mode-indicator {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        background: var(--pico-primary-background);
        color: var(--pico-primary-inverse);
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 500;
        text-transform: uppercase;
      }

      /* History dropdown */
      .history-select {
        width: 100%;
        margin-bottom: 1rem;
      }

      /* Layout */
      .right-column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        height: 100%;
        overflow: hidden;
      }
      #left-panel {
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      #left-panel .section {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #config-panel {
        flex: 0 0 auto;
        max-height: 50%;
        overflow-y: auto;
      }
      #results-panel {
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
      }

      /* Compact model list */
      .model-list-compact {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        max-height: 100px;
        overflow-y: auto;
      }
      .model-chip {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.75rem;
        background: var(--pico-muted-background-color);
        border-radius: 999px;
        font-size: 0.8rem;
      }
      .model-list-compact .model-chip.loaded {
        background: #22c55e;
        color: white;
        border: 2px solid #16a34a;
      }

      /* Frame strip */
      .frame-strip {
        display: flex;
        gap: 0.75rem;
        overflow-x: auto;
        padding: 0.75rem 0;
        max-height: 160px;
      }
      .frame-strip-thumb {
        width: 200px;
        height: 125px;
        object-fit: cover;
        border-radius: 6px;
        cursor: pointer;
        border: 3px solid transparent;
        flex-shrink: 0;
      }
      .frame-strip-thumb.selected {
        border-color: #3b82f6;
        box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
      }

      /* Run controls compact */
      .run-controls-compact {
        margin-top: auto;
        padding-top: 0.75rem;
        border-top: 1px solid var(--pico-muted-border-color);
      }
      .run-controls-compact .input-row {
        display: flex;
        gap: 0.75rem;
        align-items: flex-end;
      }
      .run-controls-compact .form-group {
        margin-bottom: 0;
      }
      .run-controls-compact label {
        font-size: 0.7rem;
      }
      .run-controls-compact input {
        width: 80px;
        padding: 0.35rem;
      }

      /* Results grid */
      .results-grid {
        display: grid;
        grid-template-columns: minmax(100px, auto) repeat(var(--model-count, 1), 1fr);
        gap: 0.5rem;
        overflow: auto;
        flex: 1;
        min-height: 0;
      }
      .results-grid-header {
        position: sticky;
        top: 0;
        background: var(--pico-card-background-color);
        z-index: 10;
        padding: 0.75rem;
        font-weight: 600;
        font-size: 0.95rem;
        border-bottom: 2px solid var(--pico-muted-border-color);
      }
      .results-grid-cell {
        padding: 0.75rem;
        background: var(--pico-muted-background-color);
        border-radius: 6px;
        font-size: 0.9rem;
        min-height: 60px;
      }
      .results-grid-cell.output {
        background: var(--pico-background-color);
        border: 1px solid var(--pico-muted-border-color);
      }
      .results-grid-cell pre {
        margin: 0;
        max-height: 200px;
        overflow: auto;
        font-size: 0.85rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .results-grid-cell .meta {
        font-size: 0.7rem;
        color: var(--pico-muted-color);
        margin-top: 0.25rem;
      }

      /* Loader */
      .results-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 2rem;
        color: var(--pico-muted-color);
      }

      /* Pagination */
      .results-pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        padding-top: 0.5rem;
        border-top: 1px solid var(--pico-muted-border-color);
        flex-shrink: 0;
      }

      /* Run info */
      .run-info {
        font-size: 0.8rem;
        color: var(--pico-muted-color);
      }


    </style>
  </head>
  <body>
    <main class="container">
      <div class="header">
        <h1>🧪 VLM Bench</h1>
        <nav class="nav-links">
          <a href="/overview.html">Overview</a>
          <a href="/debug.html">Debug</a>
          <a href="/stats.html">Stats</a>
          <a href="/review.html">Review</a>
          <a href="/observations.html">Observations</a>
          <a href="/bench.html" class="active">Bench</a>
        </nav>
      </div>

      <div class="bench-container">
        <!-- Left Panel: Prompt -->
        <div class="panel" id="left-panel">
          <div class="section">
            <div class="section-header">
              <h3>Prompt</h3>
              <span class="mode-indicator" id="prompt-mode">per-frame</span>
            </div>
            <div class="form-group">
              <label>Select Prompt</label>
              <select id="prompt-select" onchange="loadPrompt()">
                <option value="">Loading prompts...</option>
              </select>
            </div>
            <div class="form-group prompt-form-group">
              <textarea id="prompt-template" placeholder="Enter prompt template..."></textarea>
            </div>
            <div class="input-row">
              <input type="text" id="new-prompt-name" placeholder="New prompt name" />
              <button class="btn-small" onclick="savePrompt()">Save as New</button>
            </div>
          </div>
        </div>

        <!-- Right Column: Config + Results -->
        <div class="right-column">
          <!-- Config Panel -->
          <div class="panel" id="config-panel">
            <div class="panel-header">
              <h2>Run Configuration</h2>
            </div>
            <!-- Models -->
            <div class="section">
              <div class="section-header">
                <h3>Models</h3>
                <button class="btn-small" onclick="showAddModelForm()">Add</button>
              </div>
              <div id="model-list" class="model-list-compact">
                <div class="loading">Loading models...</div>
              </div>
              <div id="add-model-form" style="display: none; margin-top: 0.5rem;">
                <div class="form-group">
                  <label>Model ID</label>
                  <input type="text" id="new-model-id" placeholder="mlx-community/Qwen3.5-0.8B-8bit" />
                </div>
                <div class="form-group">
                  <label>Display Name (optional)</label>
                  <input type="text" id="new-model-name" placeholder="Qwen 0.8B" />
                </div>
                <div class="input-row">
                  <button onclick="addModel()">Add</button>
                  <button class="secondary" onclick="hideAddModelForm()">Cancel</button>
                </div>
              </div>
            </div>
            <!-- Frames -->
            <div class="section">
              <div class="section-header">
                <h3>Frames</h3>
                <span id="frame-count-display">0 / 0 selected</span>
              </div>
              <div id="frame-strip" class="frame-strip">
                <!-- thumbnails rendered here -->
              </div>
            </div>
            <!-- Run Controls -->
            <div class="run-controls-compact">
              <div class="input-row">
                <div class="form-group">
                  <label>Max Tokens</label>
                  <input type="number" id="max-tokens" value="2000" min="100" max="8000" />
                </div>
                <div class="form-group">
                  <label>Temp</label>
                  <input type="number" id="temperature" value="0.3" min="0" max="2" step="0.1" />
                </div>
                <button id="run-btn" onclick="runInference()" disabled>
                  <span class="spinner" id="run-spinner"></span>
                  <span id="run-text">Run</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Results Panel -->
          <div class="panel" id="results-panel">
            <div class="panel-header">
              <h2>Results</h2>
              <span id="run-info" class="run-info"></span>
            </div>
            <div id="results-loader" class="results-loader" style="display: none;">
              <div class="spinner active"></div>
              <span>Running inference...</span>
            </div>
            <div id="results-grid" class="results-grid">
              <div class="empty-state">Select frames and click Run to see results</div>
            </div>
            <div id="results-pagination" class="results-pagination" style="display: none;">
              <button onclick="prevPage()" id="prev-btn" disabled>&larr; Prev</button>
              <span id="page-info">Page 1 of 1</span>
              <button onclick="nextPage()" id="next-btn" disabled>Next &rarr;</button>
            </div>
            <div class="form-group" style="margin-top: 0.5rem;">
              <label>Run History</label>
              <select id="history-select" class="history-select" onchange="loadRun()">
                <option value="">Current run...</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </main>



    <script>
      // State
      let models = [];
      let prompts = [];
      let frames = [];
      let selectedFrameIds = [];
      let runs = [];
      let currentRun = null;

      // Pagination state
      let resultsPage = 1;
      const RESULTS_PER_PAGE = 10;
      let currentResults = []; // { modelName, run }[]

      // Default models
      const DEFAULT_MODELS = [
        { model_id: 'mlx-community/Qwen3.5-0.8B-8bit', display_name: 'Qwen 0.8B' },
        { model_id: 'mlx-community/Qwen3.5-2B-6bit', display_name: 'Qwen 2B' }
      ];

      function renderResultsGrid() {
        const container = document.getElementById('results-grid');
        const loader = document.getElementById('results-loader');
        const pagination = document.getElementById('results-pagination');

        if (!currentResults || currentResults.length === 0) {
          container.innerHTML = '<div class="empty-state">Select frames and click Run to see results</div>';
          pagination.style.display = 'none';
          return;
        }

        // Show run info
        const promptSelect = document.getElementById('prompt-select');
        const promptName = promptSelect.selectedOptions[0]?.text || 'Custom';
        const modelNames = currentResults.map(r => r.modelName).join(', ');
        document.getElementById('run-info').textContent = `${promptName} · ${modelNames}`;

        // Collect all unique frame IDs across all runs
        const allFrameIds = [...new Set(currentResults.flatMap(r =>
          r.run.results?.map(res => res.frame_id) || []
        ))].sort((a, b) => a - b);

        // Paginate frames
        const totalPages = Math.ceil(allFrameIds.length / RESULTS_PER_PAGE);
        resultsPage = Math.min(resultsPage, totalPages);
        const startIdx = (resultsPage - 1) * RESULTS_PER_PAGE;
        const pageFrameIds = allFrameIds.slice(startIdx, startIdx + RESULTS_PER_PAGE);

        // Set CSS variable for grid columns
        container.style.setProperty('--model-count', currentResults.length);

        // Build grid header
        let gridHtml = `<div class="results-grid-header">Frame Image</div>`;
        currentResults.forEach(({ modelName }) => {
          gridHtml += `<div class="results-grid-header">${escapeHtml(modelName)}</div>`;
        });

        // Build grid rows
        pageFrameIds.forEach(frameId => {
          const frame = frames.find(f => f.id === frameId);
          const frameImg = frame
            ? `<img src="/api/bench/frames/${frameId}/image" style="width:100%;max-width:180px;border-radius:4px;cursor:pointer;" onclick="window.open('/api/bench/frames/${frameId}/image')" />`
            : `<strong>#${frameId}</strong>`;
          gridHtml += `<div class="results-grid-cell">${frameImg}</div>`;
          currentResults.forEach(({ run }) => {
            const result = run.results?.find(r => r.frame_id === frameId);
            if (result) {
              const timing = `${result.timing_ms}ms · ${result.tokens_per_sec?.toFixed(1) || '?'} t/s`;
              gridHtml += `
                <div class="results-grid-cell output">
                  <pre>${escapeHtml(result.raw_output || '(no output)')}</pre>
                  <div class="meta">${timing}</div>
                </div>
              `;
            } else {
              gridHtml += `<div class="results-grid-cell">—</div>`;
            }
          });
        });

        container.innerHTML = gridHtml;
        pagination.style.display = totalPages > 1 ? 'flex' : 'none';
        document.getElementById('page-info').textContent = `Page ${resultsPage} of ${totalPages}`;
        document.getElementById('prev-btn').disabled = resultsPage <= 1;
        document.getElementById('next-btn').disabled = resultsPage >= totalPages;
      }

      function prevPage() {
        if (resultsPage > 1) {
          resultsPage--;
          renderResultsGrid();
        }
      }

      function nextPage() {
        resultsPage++;
        renderResultsGrid();
      }

      // Initialize
      async function init() {
        await Promise.all([
          loadModels(),
          loadPrompts(),
          loadFrames(),
          loadRunHistory()
        ]);
        updateRunButton();
      }

      // Models
      async function loadModels() {
        try {
          const res = await fetch('/api/bench/models');
          models = await res.json();

          // If no models, add defaults
          if (models.length === 0) {
            for (const m of DEFAULT_MODELS) {
              await fetch('/api/bench/models', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(m)
              });
            }
            // Reload
            const res2 = await fetch('/api/bench/models');
            models = await res2.json();
          }

          renderModels();
        } catch (err) {
          document.getElementById('model-list').innerHTML = `<div class="error">Error: ${err.message}</div>`;
        }
      }

      function renderModels() {
        const container = document.getElementById('model-list');
        if (models.length === 0) {
          container.innerHTML = '<div class="empty-state" style="font-size:0.75rem;">No models</div>';
          return;
        }

        container.innerHTML = models.map(m => {
          const isLoaded = m.status === 'loaded';
          const chipClass = isLoaded ? 'model-chip loaded' : 'model-chip';
          const memoryInfo = m.memory_mb ? ` · ${(m.memory_mb / 1024).toFixed(1)}GB` : '';
          const action = isLoaded
            ? `<button class="secondary btn-small" onclick="unloadModel('${m.id}')">Unload</button>`
            : `<button class="btn-small" onclick="loadModel('${m.id}')" ${m.status === 'loading' ? 'disabled' : ''}>Load</button>`;

          return `
            <div class="${chipClass}">
              <span>${m.display_name || m.model_id}${memoryInfo}</span>
              ${action}
            </div>
          `;
        }).join('');

        updateRunButton();
      }

      async function loadModel(id) {
        try {
          const res = await fetch('/api/bench/models/load', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model_id: id })
          });
          if (!res.ok) {
            const error = await res.json().catch(() => ({}));
            throw new Error(error.error || `HTTP ${res.status}`);
          }
          await loadModels();
        } catch (err) {
          alert('Failed to load model: ' + err.message);
        }
      }

      async function unloadModel(id) {
        try {
          const res = await fetch('/api/bench/models/unload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model_id: id })
          });
          if (!res.ok) {
            const error = await res.json().catch(() => ({}));
            throw new Error(error.error || `HTTP ${res.status}`);
          }
          await loadModels();
        } catch (err) {
          alert('Failed to unload model: ' + err.message);
        }
      }

      function showAddModelForm() {
        document.getElementById('add-model-form').style.display = 'block';
      }

      function hideAddModelForm() {
        document.getElementById('add-model-form').style.display = 'none';
        document.getElementById('new-model-id').value = '';
        document.getElementById('new-model-name').value = '';
      }

      async function addModel() {
        const modelId = document.getElementById('new-model-id').value.trim();
        const displayName = document.getElementById('new-model-name').value.trim();

        if (!modelId) {
          alert('Model ID is required');
          return;
        }

        try {
          await fetch('/api/bench/models', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model_id: modelId,
              display_name: displayName || undefined
            })
          });
          hideAddModelForm();
          await loadModels();
        } catch (err) {
          alert('Failed to add model: ' + err.message);
        }
      }

      // Prompts
      async function loadPrompts() {
        try {
          const res = await fetch('/api/bench/prompts');
          prompts = await res.json();
          renderPromptSelect();

          // Select first prompt by default
          if (prompts.length > 0) {
            document.getElementById('prompt-select').value = prompts[0].id;
            loadPrompt();
          }
        } catch (err) {
          console.error('Failed to load prompts:', err);
        }
      }

      function renderPromptSelect() {
        const select = document.getElementById('prompt-select');
        select.innerHTML = prompts.map(p =>
          `<option value="${p.id}">${p.name}</option>`
        ).join('');
      }

      async function loadPrompt() {
        const id = document.getElementById('prompt-select').value;
        if (!id) return;

        try {
          const res = await fetch(`/api/bench/prompts/${id}`);
          const prompt = await res.json();
          document.getElementById('prompt-template').value = prompt.template;
          document.getElementById('prompt-mode').textContent = prompt.mode || 'per-frame';
        } catch (err) {
          console.error('Failed to load prompt:', err);
        }
      }

      async function savePrompt() {
        const name = document.getElementById('new-prompt-name').value.trim();
        const template = document.getElementById('prompt-template').value.trim();
        const mode = document.getElementById('prompt-mode').textContent;

        if (!name || !template) {
          alert('Name and template are required');
          return;
        }

        try {
          const res = await fetch('/api/bench/prompts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, template, mode })
          });
          const newPrompt = await res.json();
          await loadPrompts();
          document.getElementById('prompt-select').value = newPrompt.id;
          document.getElementById('new-prompt-name').value = '';
        } catch (err) {
          alert('Failed to save prompt: ' + err.message);
        }
      }

      // Frames
      async function loadFrames() {
        try {
          const res = await fetch('/api/bench/frames');
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }
          frames = await res.json();
          renderFrames();
        } catch (err) {
          document.getElementById('frame-strip').innerHTML = `<div class="error" style="padding:0.5rem;">Error: ${err.message}</div>`;
        }
      }

      function renderFrames() {
        const container = document.getElementById('frame-strip');
        if (frames.length === 0) {
          container.innerHTML = '<span class="empty-state" style="font-size:0.75rem;">No frames</span>';
          return;
        }

        container.innerHTML = frames.map((f, index) => {
          const selected = selectedFrameIds.includes(f.id) ? 'selected' : '';
          return `
            <img
              src="/api/bench/frames/${f.id}/image"
              class="frame-strip-thumb ${selected}"
              data-id="${f.id}"
              data-index="${index}"
              alt="Frame ${f.id}"
              onclick="toggleFrameSelection(${f.id}, ${index})"
              ondblclick="openFrameModal(${f.id})"
            />
          `;
        }).join('');

        updateFrameCount();
      }

      function toggleFrameSelection(id, index) {
        const idx = selectedFrameIds.indexOf(id);
        if (idx === -1) {
          selectedFrameIds.push(id);
        } else {
          selectedFrameIds.splice(idx, 1);
        }
        updateSelectionUI();
      }

      function updateFrameCount() {
        document.getElementById('frame-count-display').textContent =
          `${selectedFrameIds.length} / ${frames.length} selected`;
      }

      function updateSelectionUI() {
        document.querySelectorAll('.frame-strip-thumb').forEach(img => {
          const id = Number(img.dataset.id);
          if (selectedFrameIds.includes(id)) {
            img.classList.add('selected');
          } else {
            img.classList.remove('selected');
          }
        });
        updateFrameCount();
        updateRunButton();
      }

      function openFrameModal(id) {
        const frame = frames.find(f => f.id === id);
        if (!frame) return;
        // Simple alert for now - can be enhanced later
        alert(`Frame ${id}\n\nGround Truth:\n${frame.ground_truth?.description || 'N/A'}`);
      }

      // Run inference
      function updateRunButton() {
        const loadedModel = models.some(m => m.status === 'loaded');
        const hasSelection = selectedFrameIds.length > 0;
        const btn = document.getElementById('run-btn');
        btn.disabled = !loadedModel || !hasSelection;
      }

      async function runInference() {
        const loadedModels = models.filter(m => m.status === 'loaded');
        const promptId = document.getElementById('prompt-select').value;

        if (loadedModels.length === 0 || selectedFrameIds.length === 0) return;

        const spinner = document.getElementById('run-spinner');
        const text = document.getElementById('run-text');
        const loader = document.getElementById('results-loader');
        const grid = document.getElementById('results-grid');

        spinner.classList.add('active');
        loader.style.display = 'flex';
        grid.style.display = 'none';
        document.getElementById('run-btn').disabled = true;

        currentResults = [];
        try {
          for (const model of loadedModels) {
            text.textContent = loadedModels.length > 1
              ? `Running ${model.display_name || model.model_id}…`
              : 'Running…';
            const res = await fetch('/api/bench/runs', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model_id: model.id,
                prompt_id: promptId || null,
                template: document.getElementById('prompt-template').value.trim(),
                frame_ids: selectedFrameIds,
                max_tokens: parseInt(document.getElementById('max-tokens').value),
                temperature: parseFloat(document.getElementById('temperature').value)
              })
            });
            if (!res.ok) {
              const error = await res.json().catch(() => ({}));
              throw new Error(`${model.display_name || model.model_id}: ${error.error || 'HTTP ' + res.status}`);
            }
            const run = await res.json();
            currentResults.push({ modelName: model.display_name || model.model_id, run });
          }

          resultsPage = 1;
          loader.style.display = 'none';
          grid.style.display = 'grid';
          renderResultsGrid();
          await loadRunHistory();
        } catch (err) {
          alert('Run failed: ' + err.message);
          loader.style.display = 'none';
          grid.style.display = 'grid';
        } finally {
          spinner.classList.remove('active');
          text.textContent = 'Run';
          updateRunButton();
        }
      }

      // Run History
      async function loadRunHistory() {
        try {
          const res = await fetch('/api/bench/runs?limit=20');
          runs = await res.json();

          const select = document.getElementById('history-select');
          select.innerHTML = '<option value="">Current run...</option>' +
            runs.map(r => {
              const date = new Date(r.created_at).toLocaleString();
              const modelName = r.model_name || r.model_id;
              return `<option value="${r.id}">${date} · ${modelName}</option>`;
            }).join('');
        } catch (err) {
          console.error('Failed to load run history:', err);
        }
      }

      async function loadRun() {
        const id = document.getElementById('history-select').value;
        if (!id) {
          currentResults = [];
          renderResultsGrid();
          return;
        }

        try {
          const res = await fetch(`/api/bench/runs/${id}`);
          const run = await res.json();
          // Find model info
          const model = models.find(m => m.id === run.model_id) ||
                       { display_name: run.model_id?.split('/').pop() || 'Unknown' };
          currentResults = [{
            modelName: model.display_name || model.model_id || 'Unknown',
            run
          }];
          resultsPage = 1;
          renderResultsGrid();
        } catch (err) {
          console.error('Failed to load run:', err);
        }
      }

      // Utils
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      document.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
</html>
