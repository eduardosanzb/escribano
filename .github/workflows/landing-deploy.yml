name: Landing Page Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/landing-deploy.yml'

jobs:
  deploy:
    name: Build Hugo + Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    # Pages project/domain are provisioned by OpenTofu in eduardosanzb/eduardosanzb (infra repo).
    # This workflow only builds and deploys landing content to the existing Pages project.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.148.2'
          extended: true

      - name: Build landing site
        run: hugo --source apps/landing

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Deploy to Cloudflare Pages (escribano-work)
        run: |
          wrangler pages deploy apps/landing/public \
            --project-name=escribano-work \
            --branch=main
