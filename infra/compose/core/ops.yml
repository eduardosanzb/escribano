services:
  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    ports:
      - "127.0.0.1:19999:19999"
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:latest
    container_name: fluent-bit
    command:
      - fluent-bit
      - -c
      - /fluent-bit/etc/fluent-bit.conf
    environment:
      FLUENT_BIT_S3_BUCKET: ${FLUENT_BIT_S3_BUCKET:-}
      FLUENT_BIT_S3_ENDPOINT: ${FLUENT_BIT_S3_ENDPOINT:-}
      FLUENT_BIT_S3_REGION: ${FLUENT_BIT_S3_REGION:-}
      FLUENT_BIT_S3_ACCESS_KEY_ID: ${FLUENT_BIT_S3_ACCESS_KEY_ID:-}
      FLUENT_BIT_S3_SECRET_ACCESS_KEY: ${FLUENT_BIT_S3_SECRET_ACCESS_KEY:-}
    volumes:
      - ./configs/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped

  databasus:
    image: ghcr.io/databasus/databasus:latest
    container_name: databasus
    ports:
      - "127.0.0.1:4005:4005"
    volumes:
      - /mnt/docker-data/databasus:/databasus-data
    restart: unless-stopped

  litestream:
    image: litestream/litestream:latest
    container_name: litestream
    command:
      - replicate
      - -config
      - /etc/litestream.yml
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID:-}
      LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY:-}
      LITESTREAM_BUCKET: ${LITESTREAM_BUCKET:-}
      LITESTREAM_ENDPOINT: ${LITESTREAM_ENDPOINT:-}
      LITESTREAM_REGION: ${LITESTREAM_REGION:-}
    volumes:
      - ./configs/litestream.yml:/etc/litestream.yml:ro
    restart: unless-stopped

  restic:
    image: restic/restic:latest
    container_name: restic
    entrypoint:
      - /usr/bin/restic
    command:
      - backup
      - /data/outline/uploads
      - /data/openwebui
      - /data/redis
      - /data/databasus
      - /data/postgres/backups
    environment:
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
    volumes:
      - /mnt/docker-data/outline/uploads:/data/outline/uploads:ro
      - /mnt/docker-data/openwebui:/data/openwebui:ro
      - /mnt/docker-data/redis:/data/redis:ro
      - /mnt/docker-data/databasus:/data/databasus:ro
      - /mnt/docker-data/postgres/backups:/data/postgres/backups:ro
    restart: "no"
