# Litestream runtime config is committed to git.
# Object storage values are env-driven (via --env-file): bucket/endpoint/path/credentials.
# No on-server edits are required; update environment values instead.
dbs:
  - path: ${LITESTREAM_DB_PATH}
    replicas:
      - type: s3
        bucket: ${LITESTREAM_BUCKET}
        path: ${LITESTREAM_PATH}
        endpoint: ${LITESTREAM_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
