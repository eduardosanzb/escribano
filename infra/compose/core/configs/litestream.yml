# Litestream runtime config is committed to git.
# Storage values come from environment variables passed via --env-file,
# so the same file works after every clone or rebuild with no on-server edits.
dbs:
  - path: ${LITESTREAM_DB_PATH}
    replicas:
      - type: s3
        bucket: ${LITESTREAM_BUCKET}
        path: ${LITESTREAM_PATH}
        endpoint: ${LITESTREAM_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
