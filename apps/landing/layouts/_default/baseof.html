<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      const html = document.documentElement;
      
      if (stored === 'light' || stored === 'dark') {
        html.classList.add(stored + '-mode');
        html.classList.remove(stored === 'light' ? 'dark-mode' : 'light-mode');
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        html.classList.add(prefersDark ? 'dark-mode' : 'light-mode');
        html.classList.remove(prefersDark ? 'light-mode' : 'dark-mode');
        
        if (!stored) {
          localStorage.setItem('theme', 'system');
        }
      }
    })();
  </script>

  {{ if .Description }}
  <meta name="description" content="{{ .Description }}">
  {{ else }}
  <meta name="description" content="{{ .Site.Params.description }}">
  {{ end }}

  <meta name="author" content="{{ .Site.Params.author }}">

  {{ if .IsHome }}
  <title>{{ .Site.Title }}</title>
  {{ else }}
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  {{ end }}

  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Spectral:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  {{ $css := resources.Get "css/style.css" | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">

  <meta property="og:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}">
  <meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:creator" content="@eduardosanzb">
  <script defer src="https://analytics.raus.cloud/script.js" data-website-id="02261573-1013-4c91-a3e2-6c1367bdae7c"></script>
</head>
<body>
  {{ block "main" . }}{{ end }}

  <script>
    const observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-up').forEach(function(el) {
      observer.observe(el);
    });

    const themeButtons = document.querySelectorAll('.theme-btn');
    const themeDropdownItems = document.querySelectorAll('.theme-dropdown-item');
    const html = document.documentElement;

    function updateDropdownIcon(theme) {
      const triggerIcon = document.querySelector('.current-theme-icon');
      if (!triggerIcon) return;
      
      const icons = {
        light: '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>',
        dark: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
        system: '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>'
      };
      
      triggerIcon.innerHTML = icons[theme] || icons.system;
    }

    function setTheme(theme) {
      localStorage.setItem('theme', theme);
      
      let effectiveTheme = theme;
      if (theme === 'system') {
        effectiveTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      
      html.classList.remove('light-mode', 'dark-mode');
      html.classList.add(effectiveTheme + '-mode');
      
      themeButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
      
      themeDropdownItems.forEach(item => {
        item.classList.toggle('active', item.dataset.theme === theme);
      });
      
      updateDropdownIcon(theme);
    }

    const stored = localStorage.getItem('theme') || 'system';
    setTheme(stored);

    themeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        setTheme(btn.dataset.theme);
      });
    });

    themeDropdownItems.forEach(item => {
      item.addEventListener('click', () => {
        setTheme(item.dataset.theme);
      });
    });

    const dropdownTrigger = document.querySelector('.theme-dropdown-trigger');
    const dropdown = document.querySelector('.theme-dropdown');

    if (dropdownTrigger && dropdown) {
      dropdownTrigger.addEventListener('click', () => {
        dropdown.classList.toggle('open');
      });

      document.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target)) {
          dropdown.classList.remove('open');
        }
      });

      themeDropdownItems.forEach(item => {
        item.addEventListener('click', () => {
          dropdown.classList.remove('open');
        });
      });
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      const currentTheme = localStorage.getItem('theme');
      if (currentTheme === 'system') {
        setTheme('system');
      }
    });
  </script>

  <script>
    // Waitlist form handler for Buttondown
    function initWaitlistForm(formId, messageId) {
      const form = document.getElementById(formId);
      const messageEl = document.getElementById(messageId);
      if (!form) return;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = form.querySelector('.waitlist-submit');
        const originalText = submitBtn.textContent;
        const emailInput = form.querySelector('input[type="email"]');
        
        // Disable button and show loading state
        submitBtn.disabled = true;
        submitBtn.textContent = 'Joining...';
        messageEl.textContent = '';
        messageEl.classList.remove('error', 'success');

        try {
          const formData = new FormData(form);
          const response = await fetch(form.action, {
            method: 'POST',
            body: formData,
          });

          // Buttondown redirects on success, so we check if request succeeded
          if (response.ok || response.status === 0 || response.type === 'opaqueredirect') {
            // Success
            form.style.display = 'none';
            messageEl.textContent = "You're on the list! We'll reach out when your beta slot opens.";
            messageEl.classList.add('success');
          } else {
            throw new Error('Submission failed');
          }
        } catch (error) {
          // Error
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          messageEl.textContent = 'Something went wrong. Try again or email info@escribano.work';
          messageEl.classList.add('error');
        }
      });
    }

    // Initialize both forms
    initWaitlistForm('waitlist-form-hero', 'waitlist-msg-hero');
    initWaitlistForm('waitlist-form-pricing', 'waitlist-msg-pricing');
  </script>

  <script>
    // ── Use-case terminal scenes ─────────────────────────────
    // Line types: user (green prompt), cmd (terracotta $), out (dim), ok (olive ✓), k=v (key highlight)
    const SCENES = {
      'hero-query': {
        loop: true,
        lines: [
          { type: 'user', text: 'What was I debugging yesterday around 3pm?' },
          { type: 'out',  text: '' },
          { type: 'tool', text: 'escribano search "error" --since 26h' },
          { type: 'ok',   text: '4 observations found' },
          { type: 'out',  text: '' },
          { type: 'out',  text: '14:32  VS Code    middleware/auth.ts — 401 refresh' },
          { type: 'out',  text: '14:47  Terminal   git commit "fix: refresh token"' },
          { type: 'out',  text: '15:02  Browser    Stack Overflow — JWT expiry' },
          { type: 'out',  text: '' },
          { type: 'ai',   text: 'Yesterday at 14:32 you were debugging a JWT refresh bug in middleware/auth.ts. The fix landed at 14:47.' },
        ],
      },
      'agent-memory': {
        loop: true,
        lines: [
          { type: 'user', text: 'What did I work on yesterday around 3pm?' },
          { type: 'tool', text: 'escribano recent --since 26h --json' },
          { type: 'ok',   text: '3 activity clusters found' },
          { type: 'out',  text: '' },
          { type: 'out',  text: '15:12  VS Code       Debugging JWT refresh bug' },
          { type: 'out',  text: '16:40  GitHub        Reviewing PR #214' },
          { type: 'out',  text: '18:05  Notion        Drafting release notes' },
          { type: 'out',  text: '' },
          { type: 'ai',   text: 'Yesterday ~15:12 you were debugging a JWT refresh token bug in middleware/auth.ts. Fix landed at 15:47.' },
        ],
      },
      'forensic': {
        loop: true,
        lines: [
          { type: 'cmd',  text: 'escribano search "ECONNREFUSED" --since 7d' },
          { type: 'out',  text: '' },
          { type: 'json', text: '{' },
          { type: 'json', text: '  "timestamp": "Tue 14:02",' },
          { type: 'json', text: '  "app":       "Terminal",' },
          { type: 'json', text: '  "text":      "postgres connection refused — port 5432"' },
          { type: 'json', text: '}' },
        ],
      },
      'pipeline': {
        loop: true,
        lines: [
          { type: 'cmd',  text: 'escribano entities --kind framework --since 24h \\' },
          { type: 'cmd',  text: '  | jq -r \'.entities[].value\' | sort -u' },
          { type: 'out',  text: '' },
          { type: 'out',  text: 'drizzle' },
          { type: 'out',  text: 'next.js' },
          { type: 'out',  text: 'react' },
          { type: 'out',  text: 'swift' },
        ],
      },
    };

    const TYPE_SPEED = 42;      // ms per character for typed lines
    const LINE_PAUSE = 420;     // ms between lines
    const LOOP_PAUSE = 4500;    // ms before restarting a scene

    const typedTypes = new Set(['user', 'cmd']);

    function appendLine(screen, line) {
      const el = document.createElement('div');
      el.className = 'use-line use-line--' + line.type;
      screen.appendChild(el);
      return el;
    }

    function prefixFor(type) {
      switch (type) {
        case 'user': return '<span class="use-sigil use-sigil--user">&gt;</span> ';
        case 'cmd':  return '<span class="use-sigil use-sigil--cmd">$</span> ';
        case 'tool': return '<span class="use-sigil use-sigil--tool">·</span> ';
        case 'ok':   return '<span class="use-sigil use-sigil--ok">✓</span> ';
        case 'ai':   return '<span class="use-sigil use-sigil--ai">↳</span> ';
        default: return '';
      }
    }

    function delay(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function typeInto(el, text) {
      for (let i = 0; i < text.length; i++) {
        el.innerHTML += escapeHtml(text.charAt(i));
        await delay(TYPE_SPEED);
      }
    }

    async function runScene(screen, scene, stateRef) {
      while (!stateRef.cancelled) {
        screen.innerHTML = '';
        for (const line of scene.lines) {
          if (stateRef.cancelled) return;
          const el = appendLine(screen, line);
          el.innerHTML = prefixFor(line.type);
          if (typedTypes.has(line.type)) {
            const caret = document.createElement('span');
            caret.className = 'use-caret';
            el.appendChild(caret);
            for (let i = 0; i < line.text.length; i++) {
              if (stateRef.cancelled) return;
              caret.insertAdjacentText('beforebegin', line.text.charAt(i));
              await delay(TYPE_SPEED);
            }
            caret.remove();
          } else {
            el.innerHTML += escapeHtml(line.text);
          }
          await delay(LINE_PAUSE);
        }
        if (!scene.loop) return;
        await delay(LOOP_PAUSE);
      }
    }

    function initUseTerminals() {
      const terms = document.querySelectorAll('.use-term');
      const states = new WeakMap();

      const io = new IntersectionObserver((entries) => {
        for (const e of entries) {
          const term = e.target;
          const key = term.dataset.scene;
          const scene = SCENES[key];
          if (!scene) continue;
          const screen = term.querySelector('[data-screen]');
          if (!screen) continue;

          if (e.isIntersecting) {
            const existing = states.get(term);
            if (existing && !existing.cancelled) continue; // already running
            const state = { cancelled: false };
            states.set(term, state);
            runScene(screen, scene, state);
          } else {
            const existing = states.get(term);
            if (existing) existing.cancelled = true;
          }
        }
      }, { threshold: 0.35 });

      terms.forEach(t => io.observe(t));

      // Pause all on tab hidden to save cycles
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          terms.forEach(t => {
            const s = states.get(t);
            if (s) s.cancelled = true;
          });
        } else {
          terms.forEach(t => {
            const rect = t.getBoundingClientRect();
            const onScreen = rect.top < window.innerHeight && rect.bottom > 0;
            if (!onScreen) return;
            const key = t.dataset.scene;
            const scene = SCENES[key];
            const screen = t.querySelector('[data-screen]');
            if (!scene || !screen) return;
            const state = { cancelled: false };
            states.set(t, state);
            runScene(screen, scene, state);
          });
        }
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initUseTerminals);
    } else {
      initUseTerminals();
    }
  </script>
</body>
</html>
