# Fluent Bit runtime config is committed to git.
# S3 target values are env-driven (via --env-file): bucket/endpoint/access key/secret key.
# No on-server edits are required; update environment values instead.

[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

[OUTPUT]
    Name               s3
    Match              *
    bucket             ${FLUENT_BIT_BUCKET}
    endpoint           ${FLUENT_BIT_ENDPOINT}
    aws_key_id         ${FLUENT_BIT_ACCESS_KEY_ID}
    aws_sec_key        ${FLUENT_BIT_SECRET_ACCESS_KEY}
    total_file_size    1M
    upload_timeout     1m
    use_put_object     On
    compression        gzip
    s3_key_format      /logs/$TAG/%Y/%m/%d/%H/%M/%S-$UUID.gz
