<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      const html = document.documentElement;

      if (stored === 'light' || stored === 'dark') {
        html.classList.add(stored + '-mode');
        html.classList.remove(stored === 'light' ? 'dark-mode' : 'light-mode');
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        html.classList.add(prefersDark ? 'dark-mode' : 'light-mode');
        html.classList.remove(prefersDark ? 'light-mode' : 'dark-mode');

        if (!stored) {
          localStorage.setItem('theme', 'system');
        }
      }
    })();
  </script>

  {{ if .Description }}
  <meta name="description" content="{{ .Description }}">
  {{ else }}
  <meta name="description" content="{{ .Site.Params.description }}">
  {{ end }}

  <meta name="author" content="{{ .Site.Params.author }}">

  {{ if .IsHome }}
  <title>{{ .Site.Title }}</title>
  {{ else }}
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  {{ end }}

  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <link rel="preload" href="/fonts/cormorant-garamond-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/spectral-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/dm-sans.woff2" as="font" type="font/woff2" crossorigin>

  {{ $css := resources.Get "css/style.css" | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">

  <meta property="og:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}">
  <meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:creator" content="@eduardosanzb">
  <script defer src="https://analytics.raus.cloud/script.js" data-website-id="02261573-1013-4c91-a3e2-6c1367bdae7c"></script>
</head>
<body>
  {{ block "main" . }}{{ end }}

  <script>
    const observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-up').forEach(function(el) {
      observer.observe(el);
    });

    const themeButtons = document.querySelectorAll('.theme-btn');
    const themeDropdownItems = document.querySelectorAll('.theme-dropdown-item');
    const html = document.documentElement;

    function updateDropdownIcon(theme) {
      const triggerIcon = document.querySelector('.current-theme-icon');
      if (!triggerIcon) return;

      const icons = {
        light: '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>',
        dark: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
        system: '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>'
      };

      triggerIcon.innerHTML = icons[theme] || icons.system;
    }

    function setTheme(theme) {
      localStorage.setItem('theme', theme);

      let effectiveTheme = theme;
      if (theme === 'system') {
        effectiveTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      html.classList.remove('light-mode', 'dark-mode');
      html.classList.add(effectiveTheme + '-mode');

      themeButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });

      themeDropdownItems.forEach(item => {
        item.classList.toggle('active', item.dataset.theme === theme);
      });

      updateDropdownIcon(theme);
    }

    const stored = localStorage.getItem('theme') || 'system';
    setTheme(stored);

    themeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        setTheme(btn.dataset.theme);
      });
    });

    themeDropdownItems.forEach(item => {
      item.addEventListener('click', () => {
        setTheme(item.dataset.theme);
      });
    });

    const dropdownTrigger = document.querySelector('.theme-dropdown-trigger');
    const dropdown = document.querySelector('.theme-dropdown');

    if (dropdownTrigger && dropdown) {
      dropdownTrigger.addEventListener('click', () => {
        dropdown.classList.toggle('open');
      });

      document.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target)) {
          dropdown.classList.remove('open');
        }
      });

      themeDropdownItems.forEach(item => {
        item.addEventListener('click', () => {
          dropdown.classList.remove('open');
        });
      });
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      const currentTheme = localStorage.getItem('theme');
      if (currentTheme === 'system') {
        setTheme('system');
      }
    });
  </script>

  <script>
    // Beta access form handler — POSTs email to PocketBase
    function initBetaForm(formId, messageId) {
      const form = document.getElementById(formId);
      const messageEl = document.getElementById(messageId);
      if (!form) return;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const submitBtn = form.querySelector('.waitlist-submit');
        const originalText = submitBtn.textContent;
        const emailInput = form.querySelector('input[type="email"]');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        messageEl.style.display = 'none';
        messageEl.classList.remove('error', 'success');

        try {
          const response = await fetch('https://admin.raus.cloud/api/collections/beta_requests/records', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: emailInput.value })
          });

          if (response.ok) {
            form.style.display = 'none';
            messageEl.textContent = "You\u2019re on the list \u2014 we\u2019ll reach out when your beta slot opens.";
            messageEl.classList.add('success');
            messageEl.style.display = 'block';
          } else {
            const data = await response.json().catch(() => ({}));
            throw new Error(data?.message || 'Submission failed');
          }
        } catch (error) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          messageEl.textContent = 'Something went wrong. Email info@escribano.work directly.';
          messageEl.classList.add('error');
          messageEl.style.display = 'block';
        }
      });
    }

    initBetaForm('beta-form-pricing', 'beta-msg-pricing');
    initBetaForm('beta-form-hero', 'beta-msg-hero');
  </script>

  <script>
    // ── Use-case terminal scenes ─────────────────────────────
    // Line types: user (green prompt), cmd (terracotta $), out (dim), ok (olive ✓), k=v (key highlight)
    const SCENES = {
      'hero-query': {
        loop: true,
        lines: [
          { type: 'user', text: 'What was I debugging yesterday around 3pm?' },
          { type: 'out',  text: '' },
          { type: 'tool', text: 'escribano-query search "error" --since 26h' },
          { type: 'ok',   text: '4 observations found' },
          { type: 'out',  text: '' },
          { type: 'out',  text: '14:32  VS Code    middleware/auth.ts — 401 refresh' },
          { type: 'out',  text: '14:47  Terminal   git commit "fix: refresh token"' },
          { type: 'out',  text: '15:02  Browser    Stack Overflow — JWT expiry' },
          { type: 'out',  text: '' },
          { type: 'ai',   text: 'Yesterday at 14:32 you were debugging a JWT refresh bug in middleware/auth.ts. The fix landed at 14:47.' },
        ],
      },
      'hero-query-mobile': {
        loop: true,
        lines: [
          { type: 'user', text: 'What was I debugging yesterday?' },
          { type: 'out',  text: '' },
          { type: 'tool', text: 'escribano-query search "error"' },
          { type: 'ok',   text: '4 observations found' },
          { type: 'out',  text: '' },
          { type: 'out',  text: '14:32  VS Code    auth.ts — 401 refresh' },
          { type: 'ai',   text: 'You were debugging a JWT refresh bug. Fix landed at 14:47.' },
        ],
      },
      'agent-memory': {
        loop: true,
        lines: [
          { type: 'user', text: 'What did I work on yesterday around 3pm?' },
          { type: 'tool', text: 'escribano-query recent --since 26h --json' },
          { type: 'ok',   text: '3 activity clusters found' },
          { type: 'out',  text: '' },
          { type: 'out',  text: '14:32  VS Code       Debugging JWT refresh bug' },
          { type: 'out',  text: '14:47  Terminal      git commit "fix: refresh token"' },
          { type: 'out',  text: '16:40  GitHub        Reviewing PR #214' },
          { type: 'out',  text: '' },
          { type: 'ai',   text: 'Yesterday ~14:32 you were debugging a JWT refresh token bug in middleware/auth.ts. Fix landed at 14:47.' },
        ],
      },
      'forensic': {
        loop: true,
        lines: [
          { type: 'cmd',  text: 'escribano-query search "ECONNREFUSED" --since 7d' },
          { type: 'out',  text: '' },
          { type: 'json', text: '{' },
          { type: 'json', text: '  "timestamp": "Tue 14:02",' },
          { type: 'json', text: '  "app":       "Terminal",' },
          { type: 'json', text: '  "text":      "postgres connection refused — port 5432"' },
          { type: 'json', text: '}' },
        ],
      },
      'pipeline': {
        loop: true,
        lines: [
          { type: 'cmd',  text: 'escribano-query entities --kind framework --since 24h \\' },
          { type: 'cmd',  text: '  | jq -r \'.entities[].value\' | sort -u' },
          { type: 'out',  text: '' },
          { type: 'out',  text: 'drizzle' },
          { type: 'out',  text: 'next.js' },
          { type: 'out',  text: 'react' },
          { type: 'out',  text: 'swift' },
        ],
      },
    };

    const TYPE_SPEED = 42;      // ms per character for typed lines
    const LINE_PAUSE = 420;     // ms between lines
    const LOOP_PAUSE = 4500;    // ms before restarting a scene
    const STAGGER_MS = 1200;    // ms between neighbouring terminal scenes on screen

    const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    let reduceMotion = reducedMotionQuery.matches;
    reducedMotionQuery.addEventListener('change', (e) => { reduceMotion = e.matches; });

    const typedTypes = new Set(['user', 'cmd']);

    function appendLine(screen, line) {
      const el = document.createElement('div');
      el.className = 'use-line use-line--' + line.type;
      screen.appendChild(el);
      return el;
    }

    function prefixFor(type) {
      switch (type) {
        case 'user': return '<span class="use-sigil use-sigil--user">&gt;</span> ';
        case 'cmd':  return '<span class="use-sigil use-sigil--cmd">$</span> ';
        case 'tool': return '<span class="use-sigil use-sigil--tool">·</span> ';
        case 'ok':   return '<span class="use-sigil use-sigil--ok">✓</span> ';
        case 'ai':   return '<span class="use-sigil use-sigil--ai">↳</span> ';
        default: return '';
      }
    }

    // Cancellation-aware delay — wakes every 80ms to honour stateRef.cancelled
    // so long pauses (LOOP_PAUSE) abort promptly when the terminal scrolls off.
    function cancellableDelay(ms, stateRef) {
      return new Promise(resolve => {
        const start = Date.now();
        const tick = () => {
          if (stateRef && stateRef.cancelled) return resolve();
          if (Date.now() - start >= ms) return resolve();
          setTimeout(tick, 80);
        };
        tick();
      });
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderStatic(screen, scene) {
      screen.innerHTML = '';
      for (const line of scene.lines) {
        const el = appendLine(screen, line);
        el.innerHTML = prefixFor(line.type) + escapeHtml(line.text);
      }
    }

    async function runScene(screen, scene, stateRef) {
      if (reduceMotion) {
        renderStatic(screen, scene);
        return;
      }
      while (!stateRef.cancelled) {
        screen.innerHTML = '';
        for (const line of scene.lines) {
          if (stateRef.cancelled) return;
          const el = appendLine(screen, line);
          el.innerHTML = prefixFor(line.type);
          if (typedTypes.has(line.type)) {
            const caret = document.createElement('span');
            caret.className = 'use-caret';
            el.appendChild(caret);
            for (let i = 0; i < line.text.length; i++) {
              if (stateRef.cancelled) return;
              caret.insertAdjacentText('beforebegin', line.text.charAt(i));
              await cancellableDelay(TYPE_SPEED, stateRef);
            }
            caret.remove();
          } else {
            el.innerHTML += escapeHtml(line.text);
          }
          await cancellableDelay(LINE_PAUSE, stateRef);
        }
        if (!scene.loop) return;
        await cancellableDelay(LOOP_PAUSE, stateRef);
      }
    }

    async function startScene(term, states) {
      const key = term.dataset.scene;
      const mobileKey = key + '-mobile';
      const effectiveKey = (window.innerWidth <= 768 && SCENES[mobileKey]) ? mobileKey : key;
      const scene = SCENES[effectiveKey];
      if (!scene) return;
      const screen = term.querySelector('[data-screen]');
      if (!screen) return;

      const existing = states.get(term);
      if (existing && !existing.cancelled) return;

      const order = parseInt(term.dataset.sceneOrder || '0', 10);
      const state = { cancelled: false };
      states.set(term, state);

      if (order > 0 && !reduceMotion) {
        await cancellableDelay(order * STAGGER_MS, state);
        if (state.cancelled) return;
      }
      runScene(screen, scene, state);
    }

    function initUseTerminals() {
      const terms = document.querySelectorAll('.use-term');
      const states = new WeakMap();

      const io = new IntersectionObserver((entries) => {
        for (const e of entries) {
          const term = e.target;
          if (e.isIntersecting) {
            startScene(term, states);
          } else {
            const existing = states.get(term);
            if (existing) existing.cancelled = true;
          }
        }
      }, { threshold: 0.35 });

      terms.forEach(t => io.observe(t));

      // Pause all on tab hidden to save cycles
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          terms.forEach(t => {
            const s = states.get(t);
            if (s) s.cancelled = true;
          });
        } else {
          terms.forEach(t => {
            const rect = t.getBoundingClientRect();
            const onScreen = rect.top < window.innerHeight && rect.bottom > 0;
            if (!onScreen) return;
            startScene(t, states);
          });
        }
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initUseTerminals);
    } else {
      initUseTerminals();
    }
  </script>
</body>
</html>
