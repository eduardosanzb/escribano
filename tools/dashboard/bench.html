<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VLM Bench - Escribano</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <style>
      :root { --pico-font-size: 14px; }
      main.container { max-width: 100% !important; padding: 0 1.5rem; }

      .header {
        display: flex; align-items: center; gap: 1rem;
        margin-bottom: 1rem; padding-bottom: 1rem;
        border-bottom: 1px solid var(--pico-muted-border-color);
      }
      .header h1 { margin: 0; font-size: 1.5rem; }
      .nav-links { margin-left: auto; display: flex; gap: 0.5rem; }
      .nav-links a {
        padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none;
        font-size: 0.875rem; transition: background 0.2s;
      }
      .nav-links a:hover { background: var(--pico-muted-background-color); }
      .nav-links a.active { background: var(--pico-primary-background); color: var(--pico-primary-inverse); }

      .bench-layout {
        display: grid; grid-template-columns: 35% 1fr;
        gap: 1rem; height: calc(100vh - 100px); overflow: hidden;
      }

      .panel {
        background: var(--pico-card-background-color);
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 8px; padding: 1rem;
        display: flex; flex-direction: column; overflow: hidden;
      }
      .panel-title {
        font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem;
        padding-bottom: 0.5rem; border-bottom: 1px solid var(--pico-muted-border-color);
      }

      /* Left: prompt */
      #left-panel { height: 100%; }
      #prompt-template { flex: 1; min-height: 120px; resize: vertical; font-family: monospace; font-size: 0.85rem; }
      .form-group { margin-bottom: 0.75rem; }
      .form-group label { display: block; font-size: 0.8rem; margin-bottom: 0.25rem; color: var(--pico-muted-color); }
      .input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
      .btn-small { padding: 0.25rem 0.5rem; font-size: 0.75rem; }

      /* Right column */
      .right-col { display: flex; flex-direction: column; gap: 1rem; height: 100%; overflow: hidden; }

      /* Config strip */
      .config-strip {
        display: flex; gap: 1rem; align-items: flex-start; flex-wrap: wrap;
        padding-bottom: 0.75rem; border-bottom: 1px solid var(--pico-muted-border-color);
      }
      .config-strip .field { display: flex; flex-direction: column; gap: 0.25rem; }
      .config-strip label { font-size: 0.7rem; color: var(--pico-muted-color); }
      .config-strip input { width: 80px; padding: 0.3rem; font-size: 0.85rem; }

      /* Model chips */
      .model-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
      .model-chip {
        display: flex; align-items: center; gap: 0.4rem;
        padding: 0.3rem 0.65rem; border-radius: 999px;
        font-size: 0.8rem; background: var(--pico-muted-background-color);
      }
      .model-chip.loaded { background: #22c55e; color: white; border: 2px solid #16a34a; }

      /* Frame strip */
      .frame-strip { display: flex; gap: 0.5rem; overflow-x: auto; padding: 0.5rem 0; max-height: 130px; }
      .frame-strip img {
        width: 160px; height: 100px; object-fit: cover; border-radius: 4px;
        cursor: pointer; border: 3px solid transparent; flex-shrink: 0;
      }
      .frame-strip img.selected { border-color: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.5); }

      /* Results — one output block per model, full height */
      #results-panel { flex: 1; min-height: 0; overflow: hidden; }
      .outputs-container {
        display: grid;
        grid-template-columns: repeat(var(--model-count, 1), 1fr);
        gap: 1rem; flex: 1; min-height: 0; overflow: auto;
      }
      .output-block {
        display: flex; flex-direction: column;
        background: var(--pico-background-color);
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 6px; padding: 1rem;
      }
      .output-block h3 {
        margin: 0 0 0.5rem; font-size: 0.9rem; font-weight: 600;
        padding-bottom: 0.5rem; border-bottom: 1px solid var(--pico-muted-border-color);
      }
      .output-text {
        flex: 1; font-size: 1.05rem; line-height: 1.7;
        white-space: pre-wrap; word-break: break-word;
        font-family: inherit;
      }
      .output-meta {
        font-size: 0.75rem; color: var(--pico-muted-color);
        margin-top: 0.5rem; padding-top: 0.5rem;
        border-top: 1px solid var(--pico-muted-border-color);
        flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
      }
      .copy-btn {
        padding: 0.15rem 0.5rem; font-size: 0.7rem; border-radius: 3px;
        cursor: pointer; background: var(--pico-muted-background-color);
        border: 1px solid var(--pico-muted-border-color); color: var(--pico-muted-color);
      }
      .copy-btn:hover { background: var(--pico-primary-background); color: var(--pico-primary-inverse); }

      /* Frames sent row */
      .frames-sent {
        display: flex; gap: 0.5rem; padding: 0.5rem 0;
        border-bottom: 1px solid var(--pico-muted-border-color);
        margin-bottom: 0.75rem; overflow-x: auto;
      }
      .frames-sent img {
        height: 120px; border-radius: 4px; object-fit: cover;
        cursor: pointer; flex-shrink: 0;
      }

      /* Spinner */
      .spinner {
        display: none; width: 18px; height: 18px;
        border: 2px solid var(--pico-muted-border-color);
        border-top-color: var(--pico-primary); border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .spinner.active { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .loading-overlay {
        display: none; align-items: center; justify-content: center;
        gap: 0.75rem; padding: 3rem; color: var(--pico-muted-color);
      }
      .loading-overlay.active { display: flex; }

      /* History */
      .history-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
      .history-row select { flex: 1; }

      /* Add model form */
      #add-model-form { display: none; margin-top: 0.5rem; }
      #add-model-form .input-row { margin-top: 0.25rem; }

      /* Image modal */
      .modal-bg {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.9); z-index: 1000;
        justify-content: center; align-items: center;
      }
      .modal-bg.active { display: flex; }
      .modal-bg img { max-width: 90%; max-height: 90%; object-fit: contain; }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="header">
        <h1>🧪 VLM Bench</h1>
        <nav class="nav-links">
          <a href="/overview.html">Overview</a>
          <a href="/debug.html">Debug</a>
          <a href="/stats.html">Stats</a>
          <a href="/review.html">Review</a>
          <a href="/observations.html">Observations</a>
          <a href="/bench.html" class="active">Bench</a>
        </nav>
      </div>

      <div class="bench-layout">
        <!-- Left: Prompt -->
        <div class="panel" id="left-panel">
          <div class="panel-title">Prompt</div>
          <div class="form-group">
            <select id="prompt-select" onchange="loadPrompt()"></select>
          </div>
          <div class="form-group" style="flex:1;display:flex;flex-direction:column;">
            <textarea id="prompt-template" placeholder="Enter prompt..."></textarea>
          </div>
          <div class="input-row">
            <input type="text" id="new-prompt-name" placeholder="New prompt name" />
            <button class="btn-small" onclick="savePrompt()">Save</button>
          </div>
        </div>

        <!-- Right: Config + Results -->
        <div class="right-col">
          <!-- Config strip -->
          <div class="panel" style="flex:0 0 auto;">
            <div class="config-strip">
              <div>
                <div class="model-chips" id="model-chips"></div>
                <div id="add-model-form">
                  <div class="input-row" style="margin-top:0.5rem;">
                    <input type="text" id="new-model-id" placeholder="mlx-community/..." style="flex:1;font-size:0.85rem;" />
                    <input type="text" id="new-model-name" placeholder="Name" style="width:90px;font-size:0.85rem;" />
                    <button class="btn-small" onclick="addModel()">Add</button>
                    <button class="btn-small secondary" onclick="document.getElementById('add-model-form').style.display='none'">✕</button>
                  </div>
                </div>
              </div>
              <div class="field">
                <label>Tokens</label>
                <input type="number" id="max-tokens" value="2000" min="100" max="8000" />
              </div>
              <div class="field">
                <label>Temp</label>
                <input type="number" id="temperature" value="0.3" min="0" max="2" step="0.1" />
              </div>
              <div class="field" style="align-self:flex-end;">
                <button id="run-btn" onclick="runInference()" disabled>
                  <span class="spinner" id="run-spinner"></span>
                  <span id="run-text">Run</span>
                </button>
              </div>
              <div class="field" style="align-self:flex-end;">
                <button class="btn-small secondary" onclick="document.getElementById('add-model-form').style.display='block'">+ Model</button>
              </div>
            </div>
            <div class="frame-strip" id="frame-strip"></div>
            <div style="font-size:0.75rem;color:var(--pico-muted-color);" id="frame-count">0 selected</div>
          </div>

          <!-- Results -->
          <div class="panel" id="results-panel">
            <div class="loading-overlay" id="loader">
              <div class="spinner active"></div>
              <span id="loader-text">Running…</span>
            </div>
            <div class="outputs-container" id="outputs" style="--model-count:1;">
              <div style="color:var(--pico-muted-color);font-size:0.9rem;grid-column:1/-1;">
                Select frames and click Run
              </div>
            </div>
            <div class="history-row">
              <select id="history-select" onchange="loadRun()">
                <option value="">Current run…</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Image modal -->
    <div class="modal-bg" id="image-modal" onclick="if(event.target===this)this.classList.remove('active')">
      <img id="modal-img" src="" alt="Frame" />
    </div>

    <script>
      let models = [], prompts = [], frames = [], selectedFrameIds = [];

      const DEFAULT_MODELS = [
        { model_id: "mlx-community/Qwen3.5-0.8B-8bit", display_name: "Qwen 0.8B" },
        { model_id: "mlx-community/Qwen3.5-2B-6bit", display_name: "Qwen 2B" },
      ];

      // ── Init ───────────────────────────────────────
      async function init() {
        await Promise.all([loadModels(), loadPrompts(), loadFrames(), loadRunHistory()]);
        updateRunButton();
      }

      // ── Models ─────────────────────────────────────
      async function loadModels() {
        try {
          const res = await fetch("/api/bench/models");
          models = await res.json();
          if (models.length === 0) {
            for (const m of DEFAULT_MODELS) {
              await fetch("/api/bench/models", {
                method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(m),
              });
            }
            models = await (await fetch("/api/bench/models")).json();
          }
          renderModels();
        } catch (e) { document.getElementById("model-chips").textContent = "Error: " + e.message; }
      }

      function renderModels() {
        const el = document.getElementById("model-chips");
        el.innerHTML = models.map(m => {
          const loaded = m.status === "loaded";
          return `<div class="model-chip${loaded ? " loaded" : ""}">
            <span>${m.display_name || m.id}${m.memory_mb ? " · " + (m.memory_mb/1024).toFixed(1) + "GB" : ""}</span>
            <button class="btn-small${loaded ? " secondary" : ""}" onclick="${loaded ? "unloadModel" : "loadModel"}('${m.id}')" ${m.status === "loading" ? "disabled" : ""}>${loaded ? "Unload" : "Load"}</button>
          </div>`;
        }).join("");
        updateRunButton();
      }

      async function loadModel(id) {
        try {
          const res = await fetch("/api/bench/models/load", {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model_id: id }),
          });
          if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || "HTTP " + res.status);
          await loadModels();
        } catch (e) { alert("Load failed: " + e.message); }
      }

      async function unloadModel(id) {
        try {
          await fetch("/api/bench/models/unload", {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model_id: id }),
          });
          await loadModels();
        } catch (e) { alert("Unload failed: " + e.message); }
      }

      async function addModel() {
        const id = document.getElementById("new-model-id").value.trim();
        const name = document.getElementById("new-model-name").value.trim();
        if (!id) return alert("Model ID required");
        await fetch("/api/bench/models", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model_id: id, display_name: name || undefined }),
        });
        document.getElementById("new-model-id").value = "";
        document.getElementById("new-model-name").value = "";
        document.getElementById("add-model-form").style.display = "none";
        await loadModels();
      }

      // ── Prompts ────────────────────────────────────
      async function loadPrompts() {
        prompts = await (await fetch("/api/bench/prompts")).json();
        const sel = document.getElementById("prompt-select");
        sel.innerHTML = prompts.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
        if (prompts.length > 0) { sel.value = prompts[0].id; loadPrompt(); }
      }

      async function loadPrompt() {
        const id = document.getElementById("prompt-select").value;
        if (!id) return;
        const p = await (await fetch(`/api/bench/prompts/${id}`)).json();
        document.getElementById("prompt-template").value = p.template;
      }

      async function savePrompt() {
        const name = document.getElementById("new-prompt-name").value.trim();
        const template = document.getElementById("prompt-template").value.trim();
        if (!template) return alert("Template required");
        const p = await (await fetch("/api/bench/prompts", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name || "Untitled", template, mode: "multiple" }),
        })).json();
        await loadPrompts();
        document.getElementById("prompt-select").value = p.id;
        document.getElementById("new-prompt-name").value = "";
      }

      // ── Frames ─────────────────────────────────────
      async function loadFrames() {
        frames = await (await fetch("/api/bench/frames")).json();
        const el = document.getElementById("frame-strip");
        el.innerHTML = frames.map(f =>
          `<img src="/api/bench/frames/${f.id}/image" data-id="${f.id}" onclick="toggleFrame(${f.id})" ondblclick="document.getElementById('modal-img').src='/api/bench/frames/${f.id}/image';document.getElementById('image-modal').classList.add('active')" />`
        ).join("");
        updateFrameCount();
      }

      function toggleFrame(id) {
        const idx = selectedFrameIds.indexOf(id);
        if (idx === -1) selectedFrameIds.push(id); else selectedFrameIds.splice(idx, 1);
        document.querySelectorAll("#frame-strip img").forEach(img => {
          img.classList.toggle("selected", selectedFrameIds.includes(Number(img.dataset.id)));
        });
        updateFrameCount();
        updateRunButton();
      }

      function updateFrameCount() {
        document.getElementById("frame-count").textContent = `${selectedFrameIds.length} / ${frames.length} selected`;
      }

      // ── Run ────────────────────────────────────────
      function updateRunButton() {
        const hasLoaded = models.some(m => m.status === "loaded");
        const hasFrames = selectedFrameIds.length > 0;
        document.getElementById("run-btn").disabled = !hasLoaded || !hasFrames;
      }

      async function runInference() {
        const loaded = models.filter(m => m.status === "loaded");
        const template = document.getElementById("prompt-template").value.trim();
        if (!loaded.length || !selectedFrameIds.length) return;

        const spinner = document.getElementById("run-spinner");
        const loader = document.getElementById("loader");
        const outputs = document.getElementById("outputs");

        spinner.classList.add("active");
        loader.classList.add("active");
        outputs.style.display = "none";
        document.getElementById("run-btn").disabled = true;
        document.getElementById("loader-text").textContent =
          `Running ${loaded.length} model${loaded.length > 1 ? "s" : ""} on ${selectedFrameIds.length} frame${selectedFrameIds.length > 1 ? "s" : ""}…`;

        try {
          // Sort frame IDs chronologically (by id = insertion order)
          const sortedFrameIds = [...selectedFrameIds].sort((a, b) => a - b);
          const res = await fetch("/api/bench/runs", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model_ids: loaded.map(m => m.id),
              prompt_id: document.getElementById("prompt-select").value || null,
              template,
              frame_ids: sortedFrameIds,
              max_tokens: parseInt(document.getElementById("max-tokens").value),
              temperature: parseFloat(document.getElementById("temperature").value),
            }),
          });
          if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || "HTTP " + res.status);
          const run = await res.json();
          renderOutputs(run);
          await loadRunHistory();
        } catch (e) {
          alert("Run failed: " + e.message);
        } finally {
          spinner.classList.remove("active");
          loader.classList.remove("active");
          outputs.style.display = "";
          document.getElementById("run-text").textContent = "Run";
          updateRunButton();
        }
      }

      // ── Render outputs ─────────────────────────────
      function extractText(raw) {
        if (!raw || raw === "(no result)") return "(no output)";
        // Try to pull just the text field out of GenerationResult(text='...', token=...)
        const m = raw.match(/text=['"](.+?)['"]\s*,\s*token\b/s);
        if (m) return m[1].replace(/\\n/g, "\n").replace(/\\'/g, "'").replace(/\\"/g, '"');
        // If it looks like GenerationResult garbage, try a looser match
        const m2 = raw.match(/text=['"](.+?)['"]/s);
        if (m2) return m2[1].replace(/\\n/g, "\n").replace(/\\'/g, "'").replace(/\\"/g, '"');
        // Otherwise just return the raw string — it's probably clean text already
        return raw;
      }

      function renderOutputs(run) {
        const el = document.getElementById("outputs");
        const modelIds = run.model_ids || [];
        const modelsInfo = run.models || [];
        const results = run.results || [];

        // Collect frame IDs that were sent, sorted chronologically
        const sentFrameIds = [];
        results.forEach(r => {
          const ids = r.frame_ids || (r.frame_id != null ? [r.frame_id] : []);
          ids.forEach(id => { if (!sentFrameIds.includes(id)) sentFrameIds.push(id); });
        });
        sentFrameIds.sort((a, b) => a - b);

        // Frames row
        let html = '<div class="frames-sent">';
        sentFrameIds.forEach(fid => {
          html += `<img src="/api/bench/frames/${fid}/image" onclick="document.getElementById('modal-img').src='/api/bench/frames/${fid}/image';document.getElementById('image-modal').classList.add('active')" />`;
        });
        html += '</div>';

        // Model outputs — side by side
        html += `<div style="display:grid;grid-template-columns:repeat(${modelIds.length},1fr);gap:1rem;flex:1;min-height:0;overflow:auto;">`;

        modelIds.forEach(mid => {
          const info = modelsInfo.find(m => m.model_id === mid) || {};
          const name = info.display_name || mid;
          let text = "";
          let timing = "";

          const parts = [];
          results.forEach(r => {
            const out = r.outputs?.[mid];
            if (!out) return;
            if (out.error) { parts.push("ERROR: " + out.error); return; }
            if (out.raw_output) parts.push(extractText(out.raw_output));
            if (!timing && out.timing_ms) {
              const tps = out.tokens_per_sec ? ` · ${out.tokens_per_sec.toFixed(1)} t/s` : "";
              timing = `${out.timing_ms}ms${tps}`;
            }
          });

          text = parts.join("\n\n") || "(no output)";
          const textId = "output-text-" + mid.replace(/[^a-zA-Z0-9]/g, "_");
          html += `<div class="output-block">
            <h3>${esc(name)}</h3>
            <div class="output-text" id="${textId}">${esc(text)}</div>
            ${timing ? `<div class="output-meta"><span>${timing}</span><button class="copy-btn" onclick="copyText('${textId}')">Copy</button></div>` : ""}
          </div>`;
        });

        html += '</div>';
        el.innerHTML = html;
      }

      // ── History ────────────────────────────────────
      async function loadRunHistory() {
        try {
          const runs = await (await fetch("/api/bench/runs?limit=20")).json();
          const sel = document.getElementById("history-select");
          sel.innerHTML = '<option value="">Current run…</option>' +
            runs.map(r => {
              const d = new Date(r.created_at).toLocaleString();
              const name = r.model_names ? r.model_names.join(", ") : (r.model_name || r.model_id);
              return `<option value="${r.id}">${d} · ${name}</option>`;
            }).join("");
        } catch (e) {}
      }

      async function loadRun() {
        const id = document.getElementById("history-select").value;
        if (!id) { document.getElementById("outputs").innerHTML = '<div style="color:var(--pico-muted-color);">Select frames and click Run</div>'; return; }
        const run = await (await fetch(`/api/bench/runs/${id}`)).json();
        renderOutputs(run);
      }

      // ── Util ───────────────────────────────────────
      function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

      function copyText(id) {
        const el = document.getElementById(id);
        if (!el) return;
        navigator.clipboard.writeText(el.textContent).then(() => {
          const btn = el.parentElement.querySelector(".copy-btn");
          if (btn) { btn.textContent = "Copied!"; setTimeout(() => btn.textContent = "Copy", 1500); }
        });
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
